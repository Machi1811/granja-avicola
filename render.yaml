# Render Blueprint no soporta PHP directamente
# Por favor, configura manualmente siguiendo DEPLOY.md

# Para despliegue manual:
# 1. Crear PostgreSQL Database
# 2. Crear Web Service con las siguientes configuraciones:
#    - Environment: Docker
#    - Build Command: Ver render-build.sh
#    - Start Command: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_NAME
        value: "Granja Avícola"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        sync: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: granja-avicola-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: granja-avicola-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: granja-avicola-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: granja-avicola-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: granja-avicola-db
          property: password
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: LOG_CHANNEL
        value: stack

  # Base de Datos PostgreSQL
databases:
  - name: granja-avicola-db
    plan: free
    databaseName: granja_avicola
    user: granja_user
